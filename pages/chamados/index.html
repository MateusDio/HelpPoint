<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Help Point</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Help Point</span>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-link active">Meus Chamados</a>
    </div>
    <div class="nav-user">
      <div class="avatar">U</div>
    </div>
  </nav>

  <main class="main">

    <div class="card form-card">
      <h1 class="card-title">Novo Chamado de TI</h1>

      <div class="form-grid">
        <div class="field">
          <label for="data">Data</label>
          <input type="date" id="data"/>
        </div>
        <div class="field">
          <label for="servico">Serviço</label>
          <select id="servico">
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="field">
          <label>Nível (Prioridade)</label>
          <div class="priority-group" role="radiogroup">
            <label class="priority-option baixo"><input type="radio" name="prioridade" value="baixo" checked/><span>Baixo</span></label>
            <label class="priority-option medio"><input type="radio" name="prioridade" value="medio"/><span>Médio</span></label>
            <label class="priority-option alto"><input type="radio" name="prioridade" value="alto"/><span>Alto</span></label>
            <label class="priority-option critico"><input type="radio" name="prioridade" value="critico"/><span>Crítico</span></label>
          </div>
        </div>
        <div class="field">
          <label for="local">Local</label>
          <input type="text" id="local" placeholder="Ex: Sala 203, Andar 2"/>
        </div>
      </div>

      <div class="field full-width">
        <label for="titulo">Título do Chamado</label>
        <input type="text" id="titulo" placeholder="Ex: Computador não liga"/>
      </div>

      <div class="field full-width">
        <label for="descricao">Descrição <span class="optional">(Opcional mas recomendado)</span></label>
        <textarea id="descricao" rows="5" placeholder="Descreva o problema com o máximo de detalhes possível..."></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-primary" id="btn-enviar" onclick="enviarChamado()">Enviar Chamado</button>
        <button class="btn-secondary" onclick="limparForm()">Cancelar</button>
      </div>
    </div>

    <aside class="sidebar">
      <div class="card tips-card">
        <div class="tips-header">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>Dicas</span>
        </div>
        <ul class="tips-list">
          <li>Selecione o serviço correto para agilizar o atendimento</li>
          <li>Informe o local exato do problema</li>
          <li>Para urgências críticas, entre em contato com o suporte diretamente</li>
        </ul>
      </div>

      <div class="card chamados-card">
        <div class="chamados-header">
          <h2 class="section-title">Chamados ativos</h2>
          <button class="btn-refresh" onclick="carregarChamados()" title="Atualizar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <div id="lista-chamados" class="chamados-lista">
          <div class="loading">Carregando...</div>
        </div>
      </div>
    </aside>

  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script>
    const API = 'api.php';

    async function fetchAPI(acao, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}?acao=${acao}`, opts);
      return res.json();
    }

    function showToast(msg, tipo = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast-${tipo} toast-show`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    async function carregarServicos() {
      const sel = document.getElementById('servico');
      try {
        const res = await fetchAPI('servicos');
        sel.innerHTML = '<option value="">Selecione um serviço</option>';
        res.dados.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.nome;
          sel.appendChild(opt);
        });
      } catch {
        sel.innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    async function carregarChamados() {
      const lista = document.getElementById('lista-chamados');
      lista.innerHTML = '<div class="loading">Carregando...</div>';
      try {
        const res = await fetchAPI('chamados');
        if (!res.dados || res.dados.length === 0) {
          lista.innerHTML = '<div class="sem-chamados">Nenhum chamado ativo.</div>';
          return;
        }
        lista.innerHTML = '';
        res.dados.forEach(c => {
          const item = document.createElement('div');
          item.className = 'chamado-item';
          item.innerHTML = `
            <div class="chamado-info">
              <span class="chamado-servico">${c.servico}</span>
              <span class="chamado-local">${c.local || '—'}</span>
              <span class="chamado-titulo">${c.titulo}</span>
            </div>
            <div class="chamado-right">
              <span class="badge badge-${c.prioridade}">${labelPrioridade(c.prioridade)}</span>
              <button class="btn-fechar" onclick="fecharChamado(${c.id})" title="Fechar chamado">✕</button>
            </div>`;
          lista.appendChild(item);
        });
      } catch {
        lista.innerHTML = '<div class="sem-chamados erro">Erro ao carregar chamados.</div>';
      }
    }

    function labelPrioridade(p) {
      return { baixo: 'Baixo', medio: 'Médio', alto: 'Alto', critico: 'Crítico' }[p] ?? p;
    }

    async function enviarChamado() {
      const titulo     = document.getElementById('titulo').value.trim();
      const servico_id = document.getElementById('servico').value;
      const local      = document.getElementById('local').value.trim();
      const prioridade = document.querySelector('input[name="prioridade"]:checked').value;
      const descricao  = document.getElementById('descricao').value.trim();

      if (!titulo)     { showToast('Informe o título do chamado.', 'erro'); return; }
      if (!servico_id) { showToast('Selecione um serviço.', 'erro'); return; }
      if (!local)      { showToast('Informe o local.', 'erro'); return; }

      const btn = document.getElementById('btn-enviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const res = await fetchAPI('novo_chamado', 'POST', {
          titulo, descricao, prioridade, local,
          servico_id: parseInt(servico_id),
          usuario_id: 1
        });
        if (res.sucesso) {
          showToast('Chamado #' + res.id + ' aberto com sucesso!', 'ok');
          limparForm();
          carregarChamados();
        } else {
          showToast(res.erro || 'Erro ao enviar.', 'erro');
        }
      } catch {
        showToast('Sem conexão com o servidor.', 'erro');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar Chamado';
      }
    }

    async function fecharChamado(id) {
      if (!confirm(`Fechar o chamado #${id}?`)) return;
      try {
        const res = await fetchAPI('fechar_chamado', 'POST', { id });
        if (res.sucesso) {
          showToast('Chamado #' + id + ' fechado.', 'ok');
          carregarChamados();
        } else {
          showToast(res.erro || 'Erro ao fechar.', 'erro');
        }
      } catch {
        showToast('Sem conexão com o servidor.', 'erro');
      }
    }

    function limparForm() {
      document.getElementById('titulo').value    = '';
      document.getElementById('local').value     = '';
      document.getElementById('descricao').value = '';
      document.getElementById('servico').value   = '';
      document.querySelector('input[name="prioridade"][value="baixo"]').checked = true;
      atualizarPrioridade();
    }

    function atualizarPrioridade() {
      document.querySelectorAll('.priority-option').forEach(opt => {
        opt.classList.toggle('selected', opt.querySelector('input').checked);
      });
    }

    document.querySelectorAll('.priority-option input').forEach(i => {
      i.addEventListener('change', atualizarPrioridade);
    });

    document.getElementById('data').value = new Date().toISOString().split('T')[0];
    carregarServicos();
    carregarChamados();
    atualizarPrioridade();
  </script>
</body>
</html>
